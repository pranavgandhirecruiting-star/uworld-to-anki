<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Dog silhouette sitting with a book -->
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Dog body silhouette -->
  <path d="M16 38 C16 34 18 30 22 28 C20 26 19 23 19 20 C19 15 22 11 26 11 C28 11 30 12 31 14 L33 11 C33.5 10 34 10 34.5 10.5 L34 14 C35 15 36 17 36 20 C36 23 35 25 33 27 C36 29 38 33 38 38" fill="url(#brand)"/>
  <!-- Ear -->
  <path d="M21 16 C19 12 20 9 23 10 C25 10.5 24 14 23 16" fill="url(#brand)"/>
  <!-- Eye -->
  <circle cx="25" cy="17" r="1.5" fill="white"/>
  <!-- Nose -->
  <circle cx="21" cy="20" r="1" fill="#1a1a2e"/>
  <!-- Tail wagging up -->
  <path d="M36 22 C38 18 41 16 43 17" stroke="url(#brand)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Book leaning left (the first L) -->
  <rect x="6" y="14" width="4" height="24" rx="1" fill="#7c3aed" transform="rotate(-12 8 38)"/>
  <rect x="6.5" y="14.5" width="3" height="23" rx="0.5" fill="#9461fb" transform="rotate(-12 8 38)"/>
  <!-- Book leaning right (the second L) -->
  <rect x="10" y="14" width="4" height="24" rx="1" fill="#a78bfa" transform="rotate(12 12 38)"/>
  <rect x="10.5" y="14.5" width="3" height="23" rx="0.5" fill="#c4b5fd" transform="rotate(12 12 38)"/>
  <!-- Ground line -->
  <line x1="4" y1="39" x2="44" y2="39" stroke="url(#brand)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
</svg>
